# ======================== ENVIRONMENT DETECTION ======================== #
# Single conditional: local vs SSH
if-shell '[ -n "$SSH_CONNECTION" ]' {
    # Remote: safe prefix + terminal type
    set-option -g prefix C-a
    unbind C-b
    bind C-a send-prefix
    # set -g default-terminal "xterm-256color"

    set-hook -g session-window-changed {
        if-shell -F '#{@ssh_target}' {
            set-option -g status-style 'bg=default,fg=default'
        } {
            set-option -gu status-style
        }
    }

    # Show mutagen sync indicator in status line when agent is active
    set -g status-right '#{?#(pgrep -f mutagen-agent >/dev/null 2>&1 && echo 1),🔄 ,}%Y-%m-%d %H:%M'
} {
    # Local: default prefix + native terminal + SSH-only features
    set-option -g prefix C-b
    unbind C-a
    bind C-b send-prefix
    # set -g default-terminal "tmux-256color"

    # SSH target picker — runs fzf in a temporary window, then exec's into SSH
    bind R new-window "$HOME/.config/tmux/utils/connect.sh"

    # Ollama model picker (requires local ollama)
    bind-key g display-popup 'model=$(ollama ls | tail -n+2 | cut  -f1 | fzf); ollama run $model'

    # Battery status + time
    set -g status-right '#($HOME/.config/tmux/utils/tmux-spotify.sh) | #($HOME/.config/tmux/utils/tmux-battery.sh) | %Y-%m-%d %H:%M'
}

# ======================== GENERAL SETTINGS ======================== #
#set -g status-style bg=default
set -g set-clipboard on
set -g allow-passthrough on
set -sg repeat-time 300                   #  ncrease repeat timeout
set -g focus-events on
set -g display-panes-time 800 # slightly longer pane indicators display time
set -g display-time 1000      # slightly longer status messages display time
set -g base-index 1           # start windows numbering at 1
set -g pane-base-index 1     # make pane numbering consistent with windows
set-window-option -g pane-base-index 1
set-option -g renumber-windows on
set -g status-interval 5
set -g status-right-length 120
set -g detach-on-destroy previous
set -g window-status-separator ' | '
set -g window-status-current-format '[#I:#{?#{||:#{@ssh_target},#{==:#{pane_current_command},ssh}},R,L}:#W]'
set -g window-status-format '#I:#{?#{||:#{@ssh_target},#{==:#{pane_current_command},ssh}},R,L}:#W'
set -g automatic-rename on
set -g automatic-rename-format "#{?#{==:#{pane_current_command},bash},#{b:pane_current_path},#{pane_current_command}}"
set -g renumber-windows on    # renumber windows when a window is closed
set -g mouse on
set -s escape-time 0
set-option -g status-position bottom

# ======================== VI MODE & COPY ======================== #
set-window-option -g mode-keys vi
set-window-option -g mode-style 'fg=black,bg=yellow,bold'

bind-key -T copy-mode-vi 'v' send -X begin-selection
# Yank without leaving copy mode
bind-key -T copy-mode-vi y send-keys -X copy-pipe
bind-key -T copy-mode     y send-keys -X copy-pipe

# Escape clears selection (no-op if no selection), stays in copy mode
bind-key -T copy-mode-vi Escape send-keys -X clear-selection

# Scroll bindings in copy mode
bind-key -T copy-mode-vi u send-keys -X halfpage-up
bind-key -T copy-mode-vi d send-keys -X halfpage-down
bind-key -T copy-mode-vi U send-keys -X page-up
bind-key -T copy-mode-vi D send-keys -X page-down

# Also for emacs-style copy mode
bind-key -T copy-mode u send-keys -X halfpage-up
bind-key -T copy-mode d send-keys -X halfpage-down
bind-key -T copy-mode U send-keys -X page-up
bind-key -T copy-mode D send-keys -X page-down

set-hook -g pane-mode-changed {
    if-shell -F '#{pane_in_mode}' {
        set-option -g status-style 'bg=yellow,fg=black'
    } {
        set-option -gu status-style
    }
}

# ======================== PANE MANAGEMENT ======================== #
# Splits — SSH-aware: if current pane is in an SSH session, new pane opens on same remote
bind-key | run-shell "$HOME/.config/tmux/utils/smart-split.sh -h"
bind-key - run-shell "$HOME/.config/tmux/utils/smart-split.sh -v"
bind % run-shell "$HOME/.config/tmux/utils/smart-split.sh -h"
bind '"' run-shell "$HOME/.config/tmux/utils/smart-split.sh -v"

# Resize (prefix + H/J/K/L)
bind-key -r O select-pane -t -
bind-key -r J resize-pane -D 5
bind-key -r K resize-pane -U 5
bind-key -r H resize-pane -L 5
bind-key -r L resize-pane -R 5

# Navigation (Alt+hjkl, no prefix needed)
# Cursor-position-aware: targets the pane under the cursor's column/row. No wrap-around.
bind -n M-H if -F "#{||:#{@ssh_target},#{==:#{pane_current_command},ssh}}" "send-keys M-H" "run-shell '$HOME/.config/tmux/utils/tmux-smart-nav.sh L'"
bind -n M-J if -F "#{||:#{@ssh_target},#{==:#{pane_current_command},ssh}}" "send-keys M-J" "run-shell '$HOME/.config/tmux/utils/tmux-smart-nav.sh D'"
bind -n M-K if -F "#{||:#{@ssh_target},#{==:#{pane_current_command},ssh}}" "send-keys M-K" "run-shell '$HOME/.config/tmux/utils/tmux-smart-nav.sh U'"
bind -n M-L if -F "#{||:#{@ssh_target},#{==:#{pane_current_command},ssh}}" "send-keys M-L" "run-shell '$HOME/.config/tmux/utils/tmux-smart-nav.sh R'"

# macOS: Option key sends Unicode chars (US keyboard) — always bind since terminal is macOS
bind -n ˙ if -F "#{||:#{@ssh_target},#{==:#{pane_current_command},ssh}}" "send-keys ˙" "run-shell '$HOME/.config/tmux/utils/tmux-smart-nav.sh L'"
bind -n ∆ if -F "#{||:#{@ssh_target},#{==:#{pane_current_command},ssh}}" "send-keys ∆" "run-shell '$HOME/.config/tmux/utils/tmux-smart-nav.sh D'"
bind -n ˚ if -F "#{||:#{@ssh_target},#{==:#{pane_current_command},ssh}}" "send-keys ˚" "run-shell '$HOME/.config/tmux/utils/tmux-smart-nav.sh U'"
bind -n ¬ if -F "#{||:#{@ssh_target},#{==:#{pane_current_command},ssh}}" "send-keys ¬" "run-shell '$HOME/.config/tmux/utils/tmux-smart-nav.sh R'"

# ======================== MISC BINDINGS ======================== #
bind f source-file ~/.config/tmux/tmux.conf \; display "tmux.conf reloaded!"
bind O select-pane -t :.-
# bind-key C-l switch-client -l
bind-key C-l display-popup -E "tmux list-sessions -F '#{session_name}' | fzf --reverse --header='Switch Session' | xargs -I{} tmux switch-client -t {}"
# Set default directory for new windows in this session to current directory:
bind M-c attach-session -c "#{pane_current_path}"

# mwinit in a split pane — closes on success, waits for Enter on failure
bind W split-window -v 'mwinit -f'

# Command palette (fzf)
bind \; display-popup -w 80% -h 70% -E "$HOME/.config/tmux/utils/tmux-command-palette.sh"

# Session/window tree picker
bind t choose-tree

# Dev layout: editor (top) + agent (bottom-left) + shell (bottom-right)
bind v run-shell "$HOME/.config/tmux/utils/tmux-dev-layout.sh"

# Auto-resize bottom dev-layout panes: focused pane gets 95% width
set-hook -g pane-focus-in {
    if-shell -F "#{@dev-layout-bottom}" {
        run-shell -b "tmux resize-pane -x 95%"
    }
}

# Agent Deck in new window
bind e new-window 'AGENT_DECK_ALLOW_OUTER_TMUX=1 agent-deck'

# Forward C-q only when inside an agent-deck pane
bind -n -T root C-q if-shell 'echo $AGENTDECK_INSTANCE_ID' 'send-keys C-q' 'select-pane -t :.+'

# ======================== TERMINAL OVERRIDES ======================== #
# undercurl support
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
# underscore colours - needs tmux-3.0
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

